# AIOps-Engine 配置示例
# 双AI协同：远程负责生成规划，本地负责安全审计
# ========================================
# 支持任意组合：
#  1. 远程Claude + 本地Ollama    (推荐默认方案)
#  2. 远程OpenAI + 本地Ollama
#  3. 双云端: 远程Claude + 本地OpenAI (用云端做审计)
#  4. 双本地: 远程Ollama(大模型) + 本地Ollama(小模型) 完全离线
#  5. 其他提供商: Gemini, 通义千问, DeepSeek, Mistral, 文心一言
# ========================================
# 配置说明：
#  - 云端API：需要配置 api-key，base-url 可选（自定义代理地址）
#  - 本地部署：需要配置 base-url，api-key 可选
#  - 任何提供商都可以用于 remote 或 local，完全灵活
# ========================================

aiops:
  # 远程AI配置（负责架构规划和脚本生成）
  remote:
    active-provider: claude
    api-key: 6e61acd2-be78-4eea-92a3-237a7b370943
    base-url: https://ark.cn-beijing.volces.com/api/coding/v3
    model-name: ark-code-latest
    temperature: 0.7
    max-tokens: 4096

  # 本地AI配置（负责上下文扫描和安全审计）
  local:
    active-provider: ollama
    base-url: http://localhost:11434
    model-name: llama3
    temperature: 0.3
    max-tokens: 2048

