server:
  port: 8080

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}

aiops:
  local:
    base-url: ${LOCAL_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${LOCAL_AI_KEY:sk-placeholder}
    model: ${LOCAL_AI_MODEL:gpt-4o-mini}
  remote:
    base-url: ${REMOTE_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${REMOTE_AI_KEY:sk-placeholder}
    model: ${REMOTE_AI_MODEL:gpt-4o-mini}

logging:
  level:
    root: INFO
    top.codejava.aiops: INFO
