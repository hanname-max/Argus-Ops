# AIOps-Engine 配置示例
# 双AI协同：远程负责生成规划，本地负责安全审计

aiops:
  # 远程AI配置 - 使用 Claude 进行高级规划
  remote:
    active-provider: claude
    api-key: ${ANTHROPIC_API_KEY:your-anthropic-api-key-here}
    model-name: claude-3-5-sonnet-20241022
    temperature: 0.7
    max-tokens: 4096

  # 本地AI配置 - 使用 Ollama 运行开源模型进行审计
  local:
    active-provider: ollama
    base-url: http://localhost:11434
    model-name: llama3
    temperature: 0.3
    max-tokens: 2048

# 日志配置
logging:
  level:
    root: INFO
    top.codejava: DEBUG
    dev.langchain4j: INFO
